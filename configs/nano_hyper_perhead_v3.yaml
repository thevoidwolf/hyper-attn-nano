model:
  type:        hyper-perhead
  d_model:     128
  n_layers:    4
  n_heads:     4
  d_ff:        512
  max_seq_len: 256
  vocab_size:  50257
  init_K:      -1.0

training:
  dataset:       wikitext2
  data_dir:      data/wikitext2
  batch_size:    32
  max_steps:     9000         # extended from 5000 — gives same total gradient signal as euclid v2
                              # euclid mean grad_norm ~1.026, hyper mean ~0.569 → ratio ~1.80 → 5000 * 1.80 ≈ 9000
  eval_interval: 250
  log_interval:  50
  eval_batches:  50
  lr:            6.0e-4
  weight_decay:  0.1
  warmup_steps:  500          # scaled from 300: 300/5000 * 9000 ≈ 540, rounded to 500
  min_lr_ratio:  0.1
  seed:          42
