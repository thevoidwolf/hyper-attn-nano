model:
  type:        hyper-scores-only
  d_model:     128
  n_layers:    4
  n_heads:     4
  d_ff:        512
  max_seq_len: 256
  vocab_size:  50257
  curvature:   -10.0

training:
  dataset:       wikitext2
  data_dir:      data/wikitext2
  batch_size:    32
  max_steps:     9000
  eval_interval: 250
  log_interval:  50
  eval_batches:  50
  lr:            6.0e-4
  weight_decay:  0.1
  warmup_steps:  500
  min_lr_ratio:  0.1
  seed:          42

run_id:  "probe2_scores_only"
log_dir: "results/logs/probes"
