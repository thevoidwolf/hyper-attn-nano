# Experiment A main grid — hyperbolic (hyper-fixed), scale S4, seed 1337
#

experiment:   experiment_a
spec_version: "A.1.1"
scale_tag:    S4

model:
  type:             hyper-fixed
  d_model:          384
  n_layers:         4
  n_heads:          12
  d_ff:             1536
  max_seq_len:      256
  vocab_size:       50257
  manifold_float64: true
  curvature:        -10.0
  curvature_schedule:
    type:         linear_warmup
    k_start:      -1.0
    k_end:        -10.0
    warmup_steps: 500

training:
  dataset:              wikitext2
  data_dir:             data/wikitext2
  batch_size:           32
  max_steps:            9000
  eval_interval:        250
  checkpoint_interval:  500
  log_interval:         50
  eval_batches:         50
  full_split_eval:      true
  extra_cosine_decay:   true
  lr:                   6.0e-4
  weight_decay:         0.1
  warmup_steps:         500
  min_lr_ratio:         0.1
  seed:                 1337

run_id:         "a_s4_hyper_seed1337"
log_dir:        "logs/experiment_a/a_s4_hyper_seed1337"
checkpoint_dir: "checkpoints/experiment_a/a_s4_hyper_seed1337"
notes:          "Experiment A main grid — hyper-fixed K=-10, scale S4, seed 1337."
