model:
  type:        euclid
  d_model:     128
  n_layers:    4
  n_heads:     4
  d_ff:        512
  max_seq_len: 256
  vocab_size:  50257

training:
  dataset:       wikitext2
  data_dir:      data/wikitext2
  batch_size:    32
  max_steps:     5000
  eval_interval: 250
  log_interval:  50
  eval_batches:  50
  lr:            3.0e-4      # unchanged — euclid naturally trains at this scale
  weight_decay:  0.1
  warmup_steps:  200
  min_lr_ratio:  0.1
  seed:          42
  # v1 result: mean grad_norm=1.026, clipped 3096/5000 steps (62%)
  # This is the reference point. Hyperbolic variants v2 are tuned to match this scale.
